<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>월드컵 4인 실시간 내기방</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans">

    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden p-6 mb-8">
        <h1 class="text-3xl font-extrabold text-center text-blue-600 mb-2">⚽ 실시간 4인 내기방</h1>
        
        <div class="bg-blue-50 p-4 rounded-lg mb-6 border border-blue-200">
            <label class="block text-sm font-bold text-gray-700 mb-2">👋 나는 누구인가요?</label>
            <select id="current-user" onchange="saveUser()" class="w-full border-2 border-blue-300 rounded p-3 text-lg font-bold bg-white">
                <option value="" disabled selected>이름을 선택하세요</option>
                <option value="박형철">박형철</option>
                <option value="와대">와대</option>
                <option value="손호민">손호민</option>
                <option value="최석훈">최석훈</option>
            </select>
        </div>

        <div class="bg-gray-800 p-4 rounded-lg mb-6 shadow-inner text-white">
            <h3 class="text-lg font-bold text-red-400 mb-3 border-b border-gray-600 pb-2">💸 현재 누적 벌금 (오답 횟수)</h3>
            <ul id="leaderboard" class="space-y-2 text-gray-200 text-sm md:text-base">
                <li class="text-gray-400 text-center">결과가 정산된 경기가 없습니다.</li>
            </ul>
        </div>

        <div>
            <h3 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">📋 경기 목록 및 베팅하기</h3>
            <div id="matches-list" class="space-y-6">
                <p class="text-center text-gray-500 font-bold">데이터를 불러오는 중입니다...</p>
            </div>
        </div>
    </div>

    <div class="max-w-3xl mx-auto text-center mb-8">
        <button onclick="handleAdminAction('show_menu')" class="bg-gray-700 text-white px-6 py-2 rounded-full font-bold hover:bg-black transition">👑 관리자 모드 접속</button>
    </div>

    <div id="admin-menu" class="max-w-3xl mx-auto bg-red-50 rounded-xl shadow-lg overflow-hidden p-6 border-2 border-red-200 hidden">
        <h2 class="text-xl font-extrabold text-red-600 mb-4">👑 방장 전용 관리 메뉴</h2>
        <div class="bg-white p-4 rounded border mb-4">
            <h3 class="font-bold text-gray-700 mb-2">1. 새로운 경기 등록</h3>
            <input type="text" id="new-teamA" class="w-24 border p-2 text-sm" placeholder="국가A"> VS 
            <input type="text" id="new-teamB" class="w-24 border p-2 text-sm" placeholder="국가B">
            <input type="number" id="new-handi" class="w-16 border p-2 text-sm" value="2.5" step="0.5">
            <input type="datetime-local" id="new-date" class="border p-2 text-sm">
            <button onclick="handleAdminAction('create')" class="bg-blue-600 text-white p-2 rounded text-sm">경기 열기</button>
        </div>
        <div class="bg-white p-4 rounded border mb-6">
            <h3 class="font-bold text-gray-700 mb-2">2. 경기 결과 입력</h3>
            <div id="admin-result-list" class="space-y-2"></div>
        </div>
        <button onclick="handleAdminAction('reset')" class="w-full bg-red-600 text-white p-2 rounded text-sm">모든 데이터 초기화</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://tdgcuozhvuyggktdjrry.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkZ2N1b3podnV5Z2drdGRqcnJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzA2NTgsImV4cCI6MjA5NzIwNjY1OH0.TV08rACNlnetiWJFGYZOpFc89NSpe_52dS-Zwpuy8tU';
        const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const ADMIN_PASSWORD = "1234";
        const players = ['박형철', '와대', '손호민', '최석훈'];
        let currentUser = localStorage.getItem('worldcupUser') || '';

        function checkAuth() {
            if (sessionStorage.getItem('isAdmin') === 'true') return true;
            const input = prompt("방장 비밀번호:");
            if (input === ADMIN_PASSWORD) { sessionStorage.setItem('isAdmin', 'true'); return true; }
            alert("비밀번호가 틀렸습니다."); return false;
        }

        function handleAdminAction(action, ...args) {
            if(!checkAuth()) return;
            if(action === 'show_menu') document.getElementById('admin-menu').classList.remove('hidden');
            if(action === 'create') createMatch();
            if(action === 'finish') finishMatch(...args);
            if(action === 'reset') resetAllMatches();
        }

        function init() {
            if (currentUser) document.getElementById('current-user').value = currentUser;
            loadData();
        }

        function saveUser() {
            currentUser = document.getElementById('current-user').value;
            localStorage.setItem('worldcupUser', currentUser);
            loadData();
        }

        async function loadData() {
            try {
                const { data: matches } = await client.from('matches').select('*');
                const { data: bets } = await client.from('bets').select('*');
                const sortedMatches = (matches || []).sort((a,b) => {
                    const order = { 'open':0, 'closed':1, 'finished':2 };
                    if(order[a.status] !== order[b.status]) return order[a.status] - order[b.status];
                    return new Date(b.created_at) - new Date(a.created_at);
                });
                renderMatches(sortedMatches, bets || []);
                calculateLeaderboard(sortedMatches, bets || []);
                renderAdminResults(matches || []);
            } catch(e) { console.error(e); }
        }

        function renderAdminResults(matches) {
            const list = document.getElementById('admin-result-list');
            const openMatches = matches.filter(m => m.status !== 'finished');
            list.innerHTML = openMatches.length ? openMatches.map(m => `
                <div class="flex items-center gap-1 text-xs">
                    <span class="w-1/3 truncate">${m.team_a} vs ${m.team_b}</span>
                    <input type="number" id="scoreA-${m.id}" class="w-8 border text-center" placeholder="A"> :
                    <input type="number" id="scoreB-${m.id}" class="w-8 border text-center" placeholder="B">
                    <button onclick="handleAdminAction('finish', ${m.id})" class="bg-gray-800 text-white px-2 rounded">확정</button>
                    <button onclick="closeBetting(${m.id})" class="bg-yellow-600 text-white px-2 rounded">마감</button>
                </div>`).join('') : '<p class="text-center text-gray-400">진행 중인 경기 없음</p>';
        }

        function renderMatches(matches, bets) {
            const container = document.getElementById('matches-list');
            container.innerHTML = '';
            matches.forEach(m => {
                const mBets = bets.filter(b => b.match_id === m.id);
                const myBet = mBets.find(b => b.player_name === currentUser);
                const statusText = m.status === 'open' ? '베팅중' : (m.status === 'closed' ? '🔒 마감됨' : '종료');
                let betStatusText = players.map(p => {
                    const b = mBets.find(x => x.player_name === p);
                    return b ? `<span class="font-bold ${b.pick==='A'?'text-blue-600':'text-red-600'}">${p}(${b.pick==='A'?m.team_a:m.team_b})</span>` : `<span class="text-gray-400">${p}(-)</span>`;
                }).join(' / ');

                let html = `<div class="border-2 rounded-xl p-4 mb-4 ${m.status==='finished'?'bg-gray-100 border-gray-300':'bg-white border-blue-300'}">
                    <div class="flex justify-between text-xs mb-2 text-gray-500"><span>ID: ${m.id}</span><span>${statusText}</span></div>
                    <div class="text-center font-bold text-lg mb-2">${m.team_a} vs ${m.team_b}</div>`;
                if(m.status === 'open') {
                    html += `<div class="flex gap-2"><button onclick="placeBet(${m.id},'A')" class="${myBet?.pick==='A'?'bg-blue-600 text-white':'bg-gray-200'} flex-1 p-2 rounded font-bold">${m.team_a} 승</button>
                             <button onclick="placeBet(${m.id},'B')" class="${myBet?.pick==='B'?'bg-red-600 text-white':'bg-gray-200'} flex-1 p-2 rounded font-bold">${m.team_b} 승</button></div>`;
                }
                html += `<div class="text-xs text-center mt-2 p-2 bg-gray-50 rounded">베팅: ${betStatusText}</div></div>`;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        async function placeBet(id, pick) {
            if(!currentUser) return alert('이름 선택 필수!');
            const { data: m } = await client.from('matches').select('status').eq('id', id).single();
            if(m.status !== 'open') return alert('베팅 마감!');
            await client.from('bets').delete().match({ match_id: id, player_name: currentUser });
            await client.from('bets').insert({ match_id: id, player_name: currentUser, pick: pick });
            loadData();
        }

        async function finishMatch(id) {
            const sA = document.getElementById(`scoreA-${id}`).value, sB = document.getElementById(`scoreB-${id}`).value;
            await client.from('matches').update({ score_a: sA, score_b: sB, status: 'finished' }).match({ id: id });
            loadData();
        }

        async function closeBetting(id) {
            if(!checkAuth()) return;
            await client.from('matches').update({ status: 'closed' }).match({ id: id });
            loadData();
        }

        function calculateLeaderboard(matches, bets) {
            const finished = matches.filter(m => m.status === 'finished');
            let misses = { '박형철': 0, '와대': 0, '손호민': 0, '최석훈': 0 };
            finished.forEach(m => {
                const adjA = Number(m.score_a) + Number(m.handicap);
                let w = (adjA > Number(m.score_b)) ? 'A' : (adjA < Number(m.score_b)) ? 'B' : 'D';
                if(w !== 'D') players.forEach(p => {
                    const b = bets.find(x => x.match_id === m.id && x.player_name === p);
                    if(b && b.pick !== w) misses[p]++;
                });
            });
            const sorted = Object.entries(misses).sort((a,b) => b[1]-a[1]);
            document.getElementById('leaderboard').innerHTML = sorted.map(([n, c]) => `<li class="flex justify-between bg-gray-700 p-2 rounded"><span>👤 ${n}</span><span class="${c>0?'text-red-400':'text-green-400'} font-bold">${c}회 오답</span></li>`).join('');
        }

        function createMatch() {
            const tA = document.getElementById('new-teamA').value, tB = document.getElementById('new-teamB').value, h = parseFloat(document.getElementById('new-handi').value), d = document.getElementById('new-date').value;
            client.from('matches').insert({ team_a: tA, team_b: tB, handicap: h, status: 'open', created_at: d ? new Date(d) : new Date() }).then(loadData);
        }

        function resetAllMatches() {
            if(confirm("초기화?")) {
                client.from('bets').delete().neq('id', 0).then(() => client.from('matches').delete().neq('id', 0)).then(loadData);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
