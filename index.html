<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>월드컵 4인 실시간 내기방</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans">

    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden p-6 mb-8">
        <h1 class="text-3xl font-extrabold text-center text-blue-600 mb-2">⚽ 실시간 4인 내기방</h1>
        
        <div class="bg-blue-50 p-4 rounded-lg mb-6 border border-blue-200">
            <label class="block text-sm font-bold text-gray-700 mb-2">👋 나는 누구인가요? (대리 베팅 가능)</label>
            <select id="current-user" onchange="saveUser()" class="w-full border-2 border-blue-300 rounded p-3 text-lg font-bold bg-white">
                <option value="" disabled selected>이름을 선택하세요</option>
                <option value="박형철">박형철</option>
                <option value="와대">와대</option>
                <option value="손호민">손호민</option>
                <option value="최석훈">최석훈</option>
            </select>
        </div>

        <div class="bg-gray-800 p-4 rounded-lg mb-6 shadow-inner text-white">
            <h3 class="text-lg font-bold text-yellow-400 mb-3 border-b border-gray-600 pb-2">💸 현재 모인 성의 (누적 금액)</h3>
            <ul id="leaderboard" class="space-y-2 text-gray-200 text-sm md:text-base">
                <li class="text-gray-400 text-center">결과가 정산된 경기가 없습니다.</li>
            </ul>
        </div>

        <div>
            <h3 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">📋 경기 목록 및 베팅하기</h3>
            <div id="matches-list" class="space-y-6">
                <p class="text-center text-gray-500 font-bold">데이터를 불러오는 중입니다...</p>
            </div>
        </div>
    </div>

    <div class="max-w-3xl mx-auto text-center mb-8">
        <button onclick="handleAdminAction('show_menu')" class="bg-gray-700 text-white px-6 py-2 rounded-full font-bold hover:bg-black transition">👑 관리자 모드 접속</button>
    </div>

    <div id="admin-menu" class="max-w-3xl mx-auto bg-red-50 rounded-xl shadow-lg overflow-hidden p-6 border-2 border-red-200 hidden">
        <h2 class="text-xl font-extrabold text-red-600 mb-4">👑 방장 전용 관리 메뉴</h2>
        
        <div class="bg-white p-4 rounded border mb-4">
            <h3 class="font-bold text-gray-700 mb-2">1. 경기 등록</h3>
            <div class="flex flex-wrap gap-2 items-center mb-2">
                <input type="text" id="new-teamA" class="w-24 border rounded p-2 text-sm" placeholder="국가A">
                <span class="font-bold">VS</span>
                <input type="text" id="new-teamB" class="w-24 border rounded p-2 text-sm" placeholder="국가B">
                <input type="number" id="new-handi" class="w-16 border rounded p-2 text-sm" placeholder="핸디" step="0.5" value="2.5">
            </div>
            <button onclick="handleAdminAction('create')" class="w-full bg-blue-600 text-white p-2 rounded font-bold hover:bg-blue-700 text-sm">경기 열기</button>
        </div>

        <div class="bg-white p-4 rounded border mb-4">
            <h3 class="font-bold text-gray-700 mb-2">2. 베팅 마감</h3>
            <div id="admin-close-list" class="space-y-2 text-sm"></div>
        </div>

        <div class="bg-white p-4 rounded border mb-6">
            <h3 class="font-bold text-gray-700 mb-2">3. 경기 결과 입력</h3>
            <div id="admin-result-list" class="space-y-2 text-sm"></div>
        </div>

        <div class="bg-red-100 p-4 rounded border border-red-300">
            <button onclick="logoutAdmin()" class="w-full bg-gray-500 text-white px-4 py-2 rounded font-bold hover:bg-gray-600 transition text-sm mb-2">🔒 관리자 모드 잠금</button>
            <button onclick="handleAdminAction('reset')" class="w-full bg-red-600 text-white px-4 py-2 rounded font-bold hover:bg-red-700 transition text-sm">모든 데이터 초기화</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://tdgcuozhvuyggktdjrry.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkZ2N1b3podnV5Z2drdGRqcnJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzA2NTgsImV4cCI6MjA5NzIwNjY1OH0.TV08rACNlnetiWJFGYZOpFc89NSpe_52dS-Zwpuy8tU';
        const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const ADMIN_PASSWORD = "1234";
        const players = ['박형철', '와대', '손호민', '최석훈'];
        let currentUser = localStorage.getItem('worldcupUser') || '';

        function checkAuth() {
            if (sessionStorage.getItem('isAdmin') === 'true') return true;
            const input = prompt("방장 비밀번호:");
            if (input === ADMIN_PASSWORD) { sessionStorage.setItem('isAdmin', 'true'); return true; }
            alert("비밀번호가 틀렸습니다."); return false;
        }

        function handleAdminAction(action, ...args) {
            if(!checkAuth()) return;
            if(action === 'show_menu') document.getElementById('admin-menu').classList.remove('hidden');
            if(action === 'create') createMatch();
            if(action === 'close') closeBetting(args[0]);
            if(action === 'finish') finishMatch(args[0]);
            if(action === 'reset') resetAllMatches();
        }

        function logoutAdmin() { sessionStorage.removeItem('isAdmin'); document.getElementById('admin-menu').classList.add('hidden'); }

        async function loadData() {
            try {
                const { data: matches } = await client.from('matches').select('*').order('created_at', { ascending: true });
                const { data: bets } = await client.from('bets').select('*');
                
                // ✅ 경기 정렬: 확정 안 된 것(open/closed) 위로, 확정된 것(finished) 아래로
                matches.sort((a,b) => (a.status === 'finished' ? 1 : -1) - (b.status === 'finished' ? 1 : -1));
                
                renderMatches(matches || [], bets || []);
                calculateLeaderboard(matches || [], bets || []);
                renderAdminList(matches || []);
            } catch (err) { alert(err.message); }
        }

        function renderAdminList(matches) {
            const closeList = document.getElementById('admin-close-list');
            const resultList = document.getElementById('admin-result-list');
            closeList.innerHTML = matches.filter(m => m.status === 'open').map(m => `
                <div class="flex items-center justify-between bg-gray-50 p-2 rounded">
                    <span class="text-xs truncate">${m.team_a} vs ${m.team_b}</span>
                    <button onclick="handleAdminAction('close', ${m.id})" class="bg-yellow-600 text-white px-2 py-1 rounded">마감</button>
                </div>`).join('') || '<p class="text-xs">마감할 경기 없음</p>';
            
            resultList.innerHTML = matches.filter(m => m.status !== 'finished').map(m => `
                <div class="flex items-center gap-1 bg-gray-50 p-2 rounded">
                    <span class="flex-grow text-xs">${m.team_a} vs ${m.team_b}</span>
                    <input type="number" id="sA-${m.id}" class="w-8 border p-1 rounded text-center" placeholder="A">
                    <input type="number" id="sB-${m.id}" class="w-8 border p-1 rounded text-center" placeholder="B">
                    <button onclick="handleAdminAction('finish', ${m.id})" class="bg-gray-800 text-white px-2 py-1 rounded">확정</button>
                </div>`).join('') || '<p class="text-xs">정산할 경기 없음</p>';
        }

        function renderMatches(matches, bets) {
            const container = document.getElementById('matches-list');
            container.innerHTML = '';
            matches.forEach(match => {
                const matchBets = bets.filter(b => b.match_id === match.id);
                const myBet = matchBets.find(b => b.player_name === currentUser);
                const isFinished = match.status === 'finished';
                
                let betStatusText = players.map(p => {
                    const b = matchBets.find(x => x.player_name === p);
                    const tName = b ? (b.pick === 'A' ? match.team_a : match.team_b) : '-';
                    return b ? `<span class="font-bold ${b.pick === 'A'?'text-blue-600':'text-red-600'}">${p}(${tName})</span>` : `<span class="text-gray-400">${p}(-)</span>`;
                }).join(' / ');

                let cardHTML = `
                <div class="border-2 ${isFinished?'border-gray-300 bg-gray-100 text-sm':'border-blue-300 bg-white'} rounded-xl p-4 relative shadow-sm mb-4">
                    <span class="absolute -top-3 left-4 bg-gray-700 text-white px-2 py-1 rounded text-[10px] shadow">ID: ${match.id}</span>
                    <div class="absolute top-2 right-4 flex gap-1 items-center">
                        <button onclick="editMatch(${match.id}, '${match.team_a}', '${match.team_b}', ${match.handicap})" class="text-[10px] bg-blue-100 px-2 py-1 rounded">✏️</button>
                        <button onclick="deleteMatch(${match.id})" class="text-[10px] bg-red-100 px-2 py-1 rounded">🗑️</button>
                    </div>
                    <div class="text-center mb-2 mt-2">
                        <span class="font-black text-gray-800">${match.team_a}</span> vs <span class="font-black text-gray-800">${match.team_b}</span>
                        <p class="text-[10px] text-blue-600 font-bold">핸디캡(A): ${match.handicap}</p>
                    </div>
                `;

                if (match.status === 'open') {
                    cardHTML += `
                    <div class="flex gap-2 mb-2">
                        <button onclick="placeBet(${match.id}, 'A')" class="${myBet?.pick === 'A'?'bg-blue-600 text-white':'bg-gray-200'} w-1/2 py-1 rounded font-bold text-xs">${match.team_a} 승</button>
                        <button onclick="placeBet(${match.id}, 'B')" class="${myBet?.pick === 'B'?'bg-red-600 text-white':'bg-gray-200'} w-1/2 py-1 rounded font-bold text-xs">${match.team_b} 승</button>
                    </div>
                    <div class="text-[10px] text-center bg-gray-100 p-1 rounded">${betStatusText}</div>`;
                } else if (match.status === 'closed') {
                    cardHTML += `<div class="text-center p-2 bg-yellow-100 rounded font-bold text-yellow-800 text-xs">🔒 베팅 마감</div>
                    <div class="text-[10px] text-center bg-gray-100 p-1 rounded">${betStatusText}</div>`;
                } else {
                    const sA=Number(match.score_a), sB=Number(match.score_b), h=Number(match.handicap);
                    const adjA = sA + h;
                    let result = (adjA > sB) ? 'A' : (adjA < sB) ? 'B' : 'D';
                    let text = (result === 'A') ? match.team_a+' 승' : (result === 'B') ? match.team_b+' 승' : '무승부';
                    cardHTML += `<div class="mt-2 text-center bg-gray-800 text-white rounded p-1 text-[10px]">결과: ${sA}:${sB} (${text}) | 나의 픽: ${myBet ? (myBet.pick === 'A'?match.team_a:match.team_b) : '없음'}</div>`;
                }
                cardHTML += `</div>`;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        function calculateLeaderboard(matches, bets) {
            const finishedMatches = matches.filter(m => m.status === 'finished');
            let misses = { '박형철': 0, '와대': 0, '손호민': 0, '최석훈': 0 };
            finishedMatches.forEach(m => {
                const adjA = Number(m.score_a) + Number(m.handicap);
                let winner = (adjA > Number(m.score_b)) ? 'A' : (adjA < Number(m.score_b)) ? 'B' : 'D';
                if(winner !== 'D') {
                    players.forEach(p => {
                        const b = bets.find(bet => bet.match_id === m.id && bet.player_name === p);
                        if (b && b.pick !== winner) misses[p]++;
                    });
                }
            });
            const sorted = Object.entries(misses).sort((a,b) => b[1]-a[1]);
            document.getElementById('leaderboard').innerHTML = sorted.map(([n, c]) => 
                `<li class="flex justify-between bg-gray-700 p-2 rounded"><span>👤 ${n}</span><span class="${c>0?'text-red-400':'text-green-400'} font-bold">${c*1500}원 (${c}회)</span></li>`).join('');
        }

        async function placeBet(id, p) {
            const { data: m } = await client.from('matches').select('status').eq('id', id).single();
            if(m.status !== 'open') return alert('베팅 불가능');
            await client.from('bets').delete().match({ match_id: id, player_name: currentUser });
            await client.from('bets').insert({ match_id: id, player_name: currentUser, pick: p });
            loadData();
        }

        async function createMatch() {
            const tA = document.getElementById('new-teamA').value, tB = document.getElementById('new-teamB').value, h = parseFloat(document.getElementById('new-handi').value);
            await client.from('matches').insert({ team_a: tA, team_b: tB, handicap: h, status: 'open', created_at: new Date() });
            loadData();
        }

        async function finishMatch(id) {
            const sA = document.getElementById(`sA-${id}`).value, sB = document.getElementById(`sB-${id}`).value;
            await client.from('matches').update({ score_a: sA, score_b: sB, status: 'finished' }).match({ id: id });
            loadData();
        }

        async function closeBetting(id) {
            await client.from('matches').update({ status: 'closed' }).match({ id: id });
            loadData();
        }

        async function resetAllMatches() {
            if(!confirm("초기화?")) return;
            await client.from('bets').delete().neq('id', 0);
            await client.from('matches').delete().neq('id', 0);
            loadData();
        }
        
        async function editMatch(id, a, b, h) {
            if(!checkAuth()) return;
            const nA = prompt("팀A:", a), nB = prompt("팀B:", b), nH = prompt("핸디:", h);
            if(nA && nB) await client.from('matches').update({ team_a: nA, team_b: nB, handicap: parseFloat(nH) }).match({ id: id });
            loadData();
        }
        
        async function deleteMatch(id) {
            if(!checkAuth()) return;
            if(!confirm("삭제?")) return;
            await client.from('bets').delete().match({ match_id: id });
            await client.from('matches').delete().match({ id: id });
            loadData();
        }

        window.onload = init;
    </script>
</body>
</html>
